<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Bücherliste</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>📚 Meine Bücherliste</h1>

<div class="form">
    <input type="text" id="title" placeholder="Buchtitel">
    <input type="text" id="author" placeholder="Autor">

    <select id="rating">
        <option value="1">⭐</option>
        <option value="2">⭐⭐</option>
        <option value="3">⭐⭐⭐</option>
        <option value="4">⭐⭐⭐⭐</option>
        <option value="5">⭐⭐⭐⭐⭐</option>
    </select>

    <input type="number" id="progress" placeholder="Fortschritt %" min="0" max="100">

    <label>
        <input type="checkbox" id="finished">
        Gelesen
    </label>

    <button onclick="addBook()">Hinzufügen</button>
</div>

<div id="bookList"></div>

<script src="script.js"></script>

</body>
</html>
